name: API health check

# Catches an expired/revoked API key before it silently breaks the daily
# pipeline run, by hitting each provider's cheapest auth-only endpoint on a
# schedule and opening an issue if any of them reject the configured secret.
# Providers with no secret configured are skipped, not flagged as failures.

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check Groq API key
        id: groq
        if: ${{ secrets.GROQ_API_KEY != '' }}
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GROQ_API_KEY }}" \
            https://api.groq.com/openai/v1/models)
          echo "status=$status" >> "$GITHUB_OUTPUT"
          [ "$status" = "200" ]

      - name: Check Pexels API key
        id: pexels
        if: ${{ secrets.PEXELS_API_KEY != '' }}
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: ${{ secrets.PEXELS_API_KEY }}" \
            "https://api.pexels.com/v1/search?query=test&per_page=1")
          echo "status=$status" >> "$GITHUB_OUTPUT"
          [ "$status" = "200" ]

      - name: Check Telegram dashboard bot token
        id: telegram
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' }}
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/getMe")
          echo "status=$status" >> "$GITHUB_OUTPUT"
          [ "$status" = "200" ]

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          GROQ_STATUS: ${{ steps.groq.outputs.status }}
          PEXELS_STATUS: ${{ steps.pexels.outputs.status }}
          TELEGRAM_STATUS: ${{ steps.telegram.outputs.status }}
        with:
          script: |
            const checks = [
              ['GROQ_API_KEY', process.env.GROQ_STATUS],
              ['PEXELS_API_KEY', process.env.PEXELS_STATUS],
              ['TELEGRAM_BOT_TOKEN', process.env.TELEGRAM_STATUS],
            ].filter(([, status]) => status && status !== '200');

            if (checks.length === 0) return;

            const title = 'API health check failed — a secret may be expired or revoked';
            const body = 'The weekly API health check found one or more secrets returning a '
              + 'non-200 response:\n\n'
              + checks.map(([name, status]) => `- \`${name}\`: HTTP ${status}`).join('\n')
              + `\n\nRun: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              + '\n\nRotate the affected key at its provider and update the repo secret.';

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'api-health',
              state: 'open',
            });
            const alreadyOpen = existing.find(issue => issue.title === title);
            if (alreadyOpen) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: alreadyOpen.number,
                body: `Still failing: ${body}`,
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['api-health'],
            });
