name: Daily media empire run

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pages: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 python-dotenv lxml pytest edge-tts

      - name: Verify ffmpeg is available
        run: ffmpeg -version && ffprobe -version

      - name: Run Squad 1 — Intel scrape
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OLLAMA_MODEL: llama3:8b
        run: python squad1_intel/squad1_run.py

      - name: Run Squad 2 — Content generation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OLLAMA_MODEL: llama3:8b
        run: python squad2_content/squad2_run.py

      - name: Run Squad 3 — Multimedia production
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OLLAMA_MODEL: llama3:8b
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python squad3_production/squad3_run.py

      - name: Run Squad 6 — Analytics feedback loop
        run: python squad6_analytics/analytics_run.py

      - name: Run tests
        run: pytest tests/ -v

      - name: Generate GitHub Pages site
        run: python generate_site.py

      - name: Upload all outputs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-content-${{ github.run_id }}
          path: |
            master_intel_digest.md
            squad2_output/**
            squad3_output/**
          retention-days: 7

      - name: Commit seen_items.json, analytics state, and docs
        run: |
          git config user.name "media-empire-bot"
          git config user.email "bot@noreply.com"
          git add -f seen_items.json analytics_history.json niche_boosts.json docs/index.html || true
          git diff --staged --quiet || git commit -m "chore: daily run $(date +%Y-%m-%d)"
          for i in 1 2 3 4; do git push && break || sleep $((i * 4)); done

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const today = new Date().toISOString().slice(0, 10);
            const title = `Daily pipeline failed — ${today}`;
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'pipeline-failure',
              state: 'open',
            });
            const alreadyOpen = existing.find(issue => issue.title === title);
            if (alreadyOpen) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: alreadyOpen.number,
                body: `Failed again on a re-run: ${runUrl}`,
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `The daily media empire pipeline failed after retries.\n\nRun: ${runUrl}`,
              labels: ['pipeline-failure'],
            });
