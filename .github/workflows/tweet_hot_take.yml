name: Tweet Hot Take (Delayed)

on:
  schedule:
    # Runs at 12:00 UTC — ~6h after the main pipeline (06:00 UTC)
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  post-hot-take:
    name: Post staged hot take
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install tweepy Pillow

      - name: Post hot take
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          TWITTER_HANDLE: ${{ secrets.TWITTER_HANDLE }}
          BRAND_BG_COLOR: ${{ vars.BRAND_BG_COLOR }}
          BRAND_ACCENT_COLOR: ${{ vars.BRAND_ACCENT_COLOR }}
          BRAND_TEXT_COLOR: ${{ vars.BRAND_TEXT_COLOR }}
        run: python post_hot_take.py
