name: Daily media empire run

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 python-dotenv lxml pytest

      - name: Run Squad 1 — Intel scrape
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OLLAMA_MODEL: llama3:8b
        run: python squad1_intel/squad1_run.py

      - name: Run Squad 2 — Content generation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OLLAMA_MODEL: llama3:8b
        run: python squad2_content/squad2_run.py

      - name: Run tests
        run: pytest tests/ -v

      - name: Generate GitHub Pages site
        run: python generate_site.py

      - name: Upload digest and scripts as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-content-${{ github.run_id }}
          path: |
            master_intel_digest.md
            squad2_output/**
          retention-days: 7

      - name: Commit seen_items.json and docs
        run: |
          git config user.name "media-empire-bot"
          git config user.email "bot@noreply.com"
          git add -f seen_items.json docs/index.html || true
          git diff --staged --quiet || git commit -m "chore: daily run $(date +%Y-%m-%d)"
          for i in 1 2 3 4; do git push && break || sleep $((i * 4)); done

      - name: Notify on failure
        if: failure()
        run: |
          echo "Pipeline failed on $(date). Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
