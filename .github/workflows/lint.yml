name: Lint

on:
  pull_request:
    branches: [main]

jobs:
  commitlint:
    name: Conventional commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install commitlint
        run: npm install --save-dev @commitlint/config-conventional @commitlint/cli

      - name: Lint commits on this PR
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  pr-title:
    name: PR title format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install commitlint
        run: npm install --save-dev @commitlint/config-conventional @commitlint/cli

      - name: Lint PR title
        run: echo "${{ github.event.pull_request.title }}" | npx commitlint --verbose

  pytest:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install requests beautifulsoup4 python-dotenv lxml pytest edge-tts

      - name: Run tests
        run: pytest tests/ -v

  ruff:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ruff
        run: pip install ruff

      # Advisory only for now — there's pre-existing lint debt on main this
      # doesn't block on. Tightens once that backlog is cleared separately.
      - name: Run ruff check
        run: ruff check . --output-format=github
        continue-on-error: true
