name: Daily media empire run

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 python-dotenv lxml pytest edge-tts playwright tweepy Pillow

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Verify ffmpeg is available
        run: ffmpeg -version && ffprobe -version

      - name: Run Squad 1 — Intel scrape
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OLLAMA_MODEL: llama3:8b
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN_SQUAD1_INTEL: ${{ secrets.TELEGRAM_BOT_TOKEN_SQUAD1_INTEL }}
        run: python squad1_intel/squad1_run.py

      - name: Run Squad 2 — Content generation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OLLAMA_MODEL: llama3:8b
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN_SQUAD2_NEWSLETTER: ${{ secrets.TELEGRAM_BOT_TOKEN_SQUAD2_NEWSLETTER }}
          TELEGRAM_BOT_TOKEN_SQUAD2_TWITTER: ${{ secrets.TELEGRAM_BOT_TOKEN_SQUAD2_TWITTER }}
          TELEGRAM_BOT_TOKEN_SQUAD2_REELS: ${{ secrets.TELEGRAM_BOT_TOKEN_SQUAD2_REELS }}
        run: python squad2_content/squad2_run.py

      - name: Run Squad 3 — Multimedia production
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OLLAMA_MODEL: llama3:8b
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN_SQUAD3_PRODUCTION: ${{ secrets.TELEGRAM_BOT_TOKEN_SQUAD3_PRODUCTION }}
        run: python squad3_production/squad3_run.py

      - name: Run Squad 4 — Publishing
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          TWITTER_HANDLE: ${{ secrets.TWITTER_HANDLE }}
          BRAND_BG_COLOR: ${{ secrets.BRAND_BG_COLOR }}
          BRAND_ACCENT_COLOR: ${{ secrets.BRAND_ACCENT_COLOR }}
          BRAND_TEXT_COLOR: ${{ secrets.BRAND_TEXT_COLOR }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN_SQUAD4_PUBLISH: ${{ secrets.TELEGRAM_BOT_TOKEN_SQUAD4_PUBLISH }}
          APPROVAL_TIMEOUT_SECS: ${{ secrets.APPROVAL_TIMEOUT_SECS }}
        run: python squad4_publish/squad4_run.py

      - name: Run Squad 6 — Analytics feedback loop
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN_SQUAD6_ANALYTICS: ${{ secrets.TELEGRAM_BOT_TOKEN_SQUAD6_ANALYTICS }}
        run: python squad6_analytics/analytics_run.py

      - name: Run Chief of Staff — daily roundup
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN_CHIEF_OF_STAFF: ${{ secrets.TELEGRAM_BOT_TOKEN_CHIEF_OF_STAFF }}
        run: python chief_of_staff.py

      - name: Notify — roundup issue + approval email + Telegram dashboard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python notify.py

      - name: Run tests
        run: pytest tests/ -v

      - name: Upload all outputs as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: daily-content-${{ github.run_id }}
          path: |
            master_intel_digest.md
            squad2_output/**
            squad3_output/**
            reports/**
          retention-days: 7

      - name: Commit seen_items.json and analytics state
        run: |
          git config user.name "media-empire-bot"
          git config user.email "bot@noreply.com"
          git add -f seen_items.json analytics_history.json niche_boosts.json || true
          git diff --staged --quiet || git commit -m "chore: daily run $(date +%Y-%m-%d)"
          for i in 1 2 3 4; do git push && break || sleep $((i * 4)); done

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const today = new Date().toISOString().slice(0, 10);
            const title = `Daily pipeline failed — ${today}`;
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'pipeline-failure',
              state: 'open',
            });
            const alreadyOpen = existing.find(issue => issue.title === title);
            if (alreadyOpen) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: alreadyOpen.number,
                body: `Failed again on a re-run: ${runUrl}`,
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `The daily media empire pipeline failed after retries.\n\nRun: ${runUrl}`,
              labels: ['pipeline-failure'],
            });
